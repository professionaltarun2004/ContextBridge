name: Backend Tests & Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ruff linter
        run: ruff check app/ tests/

      - name: Run Mypy type checker
        run: mypy app/ --ignore-missing-imports

      - name: Run pytest with coverage
        # Uses .env.test for all credentials — no real services required
        run: pytest
        env:
          # Override DATABASE_URL to use in-memory SQLite for CI
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          AUTH0_DOMAIN: test.auth0.com
          AUTH0_AUDIENCE: https://test.contextbridge.ai
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
          OPENAI_API_KEY: sk-test-placeholder
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          REDIS_URL: redis://localhost:6379/0
          SENTRY_DSN: ""
          APP_ENV: testing
          LOG_LEVEL: WARNING
          CORS_ORIGINS: '["*"]'

      - name: Upload coverage XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14

      - name: Report coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage.xml
          badge: true
          format: markdown
          output: both
        continue-on-error: true
