version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # ContextOS FastAPI Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contextos_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy}
      MOCK_MODE: ${MOCK_MODE:-False}
      APP_ENV: development
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
