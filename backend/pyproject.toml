[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN"]
ignore = ["ANN101", "ANN102", "ANN401", "E501", "ANN204", "UP042"]
per-file-ignores = {"tests/*" = ["ANN"]}

[tool.pyright]
include = ["app", "tests"]
extraPaths = ["."]
pythonVersion = "3.11"
venvPath = "."
venv = ".venv"
